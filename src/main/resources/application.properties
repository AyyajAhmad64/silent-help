spring.application.name=silent-help

spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/silent_help?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

spring.thymeleaf.cache=false
server.error.whitelabel.enabled=false
server.port=8086

app.seed.enabled=true
app.policy.version=2026-05
app.default-admin.username=admin
app.default-admin.password=${DEFAULT_ADMIN_PASSWORD:change-me}
app.registration.allowed-email-domains=edu,edu.in,ac.in
app.upload.dir=uploads
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=6MB
