<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:sec="https://www.thymeleaf.org/extras/spring-security"
      th:fragment="layout(title, content)">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title th:replace="${title}">Silent Help</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link th:href="@{/css/app.css}" rel="stylesheet">
</head>
<body>
<nav class="navbar navbar-expand-lg sticky-top app-navbar">
    <div class="container">
        <a class="navbar-brand brand-mark" th:href="@{/}">
            <span class="brand-icon"><i class="bi bi-shield-check"></i></span>
            Silent Help
        </a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="mainNav">
            <ul class="navbar-nav ms-auto align-items-lg-center gap-lg-2">
                <li class="nav-item"><a class="nav-link" th:href="@{/requests}">Browse</a></li>
                <li class="nav-item"><a class="nav-link" th:href="@{/about}">About</a></li>
                <li class="nav-item"><a class="nav-link" th:href="@{/contact}">Contact</a></li>
                <li class="nav-item"><a class="nav-link" th:href="@{/feedback}">Feedback</a></li>
                <li class="nav-item" sec:authorize="isAuthenticated()"><a class="nav-link" th:href="@{/dashboard}">Dashboard</a></li>
                <li class="nav-item" sec:authorize="isAuthenticated()">
                    <a class="nav-link nav-icon-link" th:href="@{/chats}" aria-label="Private chats">
                        <i class="bi bi-chat-dots"></i>
                        <span class="nav-count" th:if="${navChatUnreadCount > 0}" th:text="${navChatUnreadCount}">0</span>
                    </a>
                </li>
                <li class="nav-item" sec:authorize="isAuthenticated()">
                    <a class="nav-link nav-icon-link" th:href="@{/notifications}" aria-label="Notifications">
                        <i class="bi bi-bell"></i>
                        <span class="nav-count" th:if="${navUnreadCount > 0}" th:text="${navUnreadCount}">0</span>
                    </a>
                </li>
                <li class="nav-item" sec:authorize="hasRole('ADMIN')"><a class="nav-link" th:href="@{/admin}">Admin</a></li>
                <li class="nav-item"><button class="theme-toggle" type="button" id="themeToggle" aria-label="Toggle dark mode"><i class="bi bi-moon-stars"></i></button></li>
                <li class="nav-item" sec:authorize="!isAuthenticated()"><a class="btn btn-outline-primary btn-sm px-3" th:href="@{/login}">Login</a></li>
                <li class="nav-item" sec:authorize="!isAuthenticated()"><a class="btn btn-primary btn-sm px-3" th:href="@{/register}">Join</a></li>
                <li class="nav-item dropdown" sec:authorize="isAuthenticated()">
                    <button class="profile-menu-toggle" type="button" data-bs-toggle="dropdown" aria-expanded="false" aria-label="Account menu">
                        <i class="bi bi-person-circle"></i>
                        <span class="profile-menu-text">
                            <strong th:text="${navUser != null ? navUser.displayName : #authentication.name}">User</strong>
                            <small th:text="${navUser != null ? '@' + navUser.username : #authentication.name}">@username</small>
                        </span>
                    </button>
                    <div class="dropdown-menu dropdown-menu-end profile-dropdown">
                        <div class="profile-summary">
                            <strong th:text="${navUser != null ? navUser.displayName : #authentication.name}">User</strong>
                            <span th:text="${navUser != null ? navUser.email : ''}">email</span>
                            <small th:if="${navUser != null && navUser.department != null && !#strings.isEmpty(navUser.department)}" th:text="${navUser.department}">Department</small>
                        </div>
                        <hr class="dropdown-divider">
                        <a class="dropdown-item" th:href="@{/profile}"><i class="bi bi-person-lines-fill me-2"></i>Profile</a>
                        <form th:action="@{/logout}" method="post">
                            <button class="dropdown-item text-danger" type="submit"><i class="bi bi-box-arrow-right me-2"></i>Logout</button>
                        </form>
                    </div>
                </li>
            </ul>
        </div>
    </div>
</nav>

<div class="toast-zone container mt-3" th:if="${success != null || error != null}">
    <div th:if="${success}" class="alert alert-success alert-dismissible fade show" role="alert">
        <i class="bi bi-check-circle me-2"></i><span th:text="${success}">Done</span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
    <div th:if="${error}" class="alert alert-danger alert-dismissible fade show" role="alert">
        <i class="bi bi-exclamation-triangle me-2"></i><span th:text="${error}">Error</span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
</div>

<div th:replace="${content}"></div>

<footer class="footer">
    <div class="container d-flex flex-column flex-md-row justify-content-between gap-2">
        <span>Silent Help - Anonymous student support with accountable moderation.</span>
        <span class="text-muted">Created by Ayyaj Shaikh</span>
    </div>
</footer>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/app.js}"></script>
</body>
</html>
