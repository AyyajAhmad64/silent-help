<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{fragments/layout :: layout(~{::title}, ~{::main})}">
<title>Create Request | Silent Help</title>
<main class="dashboard-layout">
    <div class="container">
        <div class="layout-grid">
            <div th:replace="~{fragments/sidebar :: sidebar}"></div>
            <section class="content-panel">
                <span class="eyebrow dark">New request</span>
                <h1>Create help request</h1>
                <form th:action="@{/requests}" th:object="${helpRequestForm}" method="post" enctype="multipart/form-data" class="form-stack mt-4">
                    <label>Title<input th:field="*{title}" class="form-control" placeholder="Example: Need Java notes for unit 3" required><span class="text-danger small" th:errors="*{title}"></span></label>
                    <label>Category<select th:field="*{categoryId}" class="form-select" required><option value="">Choose category</option><option th:each="category : ${categories}" th:value="${category.id}" th:text="${category.name}">Category</option></select><span class="text-danger small" th:errors="*{categoryId}"></span></label>
                    <div class="form-grid">
                        <label>Priority<select th:field="*{urgency}" class="form-select"><option value="LOW">Low</option><option value="NORMAL">Normal</option><option value="HIGH">High</option><option value="URGENT">Urgent</option></select></label>
                        <label>Needed by<input th:field="*{expectedBy}" class="form-control" type="date"></label>
                    </div>
                    <label>Preferred contact or handoff<input th:field="*{preferredContact}" class="form-control" placeholder="Example: Reply here, library after 4 PM, class CR"></label>
                    <label>Campus group / department<input th:field="*{campusGroup}" class="form-control" placeholder="Example: MCA, Engineering, MBA, Hostel Block A"></label>
                    <label>Tags<input th:field="*{tags}" class="form-control" placeholder="Example: java, unit-3, notes, exam"></label>
                    <label>Attachment link<input th:field="*{attachmentUrl}" class="form-control" placeholder="Paste Google Drive, PDF, image, or notes link"></label>
                    <label>Optional image<input class="form-control" type="file" name="attachmentImage" accept="image/png,image/jpeg,image/gif,image/webp"><span class="text-danger small" th:errors="*{attachmentUrl}"></span></label>
                    <label>Details<textarea th:field="*{description}" class="form-control" rows="7" required></textarea><span class="text-danger small" th:errors="*{description}"></span></label>
                    <div class="suggestion-panel">
                        <div>
                            <strong>Smart suggestions</strong>
                            <small>Generated from your title and tags while you type.</small>
                        </div>
                        <div id="smartSuggestions" class="suggestion-chips">
                            <span>Use clear subject name</span>
                            <span>Add deadline</span>
                            <span>Mention preferred format</span>
                        </div>
                    </div>
                    <label class="switch-line"><input th:field="*{anonymous}" class="form-check-input" type="checkbox"> Post anonymously in public feed</label>
                    <button class="btn btn-primary" type="submit">Publish Request</button>
                </form>
            </section>
        </div>
    </div>
</main>
</html>
