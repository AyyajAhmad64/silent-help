<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{fragments/layout :: layout(~{::title}, ~{::main})}">
<title>Browse Requests | Silent Help</title>
<main class="section alt">
    <div class="container">
        <div class="feed-toolbar">
            <div><span class="eyebrow dark">Help Feed</span><h1>Browse student requests</h1></div>
            <a class="btn btn-primary" th:href="@{/requests/new}"><i class="bi bi-plus-circle me-2"></i>Create Request</a>
        </div>
        <form class="filter-bar" th:action="@{/requests}" method="get">
            <input class="form-control" name="q" th:value="${query}" placeholder="Search title or details">
            <select class="form-select" name="category">
                <option value="">All categories</option>
                <option th:each="category : ${categories}" th:value="${category.slug}" th:selected="${category.slug == selectedCategory}" th:text="${category.name}">Category</option>
            </select>
            <select class="form-select compact-select" name="urgency">
                <option value="">Any priority</option>
                <option value="LOW" th:selected="${selectedUrgency == 'LOW'}">Low</option>
                <option value="NORMAL" th:selected="${selectedUrgency == 'NORMAL'}">Normal</option>
                <option value="HIGH" th:selected="${selectedUrgency == 'HIGH'}">High</option>
                <option value="URGENT" th:selected="${selectedUrgency == 'URGENT'}">Urgent</option>
            </select>
            <select class="form-select compact-select" name="status">
                <option value="">Active requests</option>
                <option value="OPEN" th:selected="${selectedStatus == 'OPEN'}">Open</option>
            </select>
            <button class="btn btn-dark" type="submit"><i class="bi bi-search"></i></button>
        </form>
        <div class="row g-4 mt-1">
            <div class="col-md-6 col-xl-4" th:each="request : ${requests.content}">
                <a class="request-card" th:href="@{/requests/{id}(id=${request.id})}">
                    <div class="d-flex justify-content-between gap-2">
                        <span class="badge rounded-pill" th:text="${request.category.name}">Category</span>
                        <span class="status-dot urgency" th:classappend="${request.urgency == 'URGENT' || request.urgency == 'HIGH'} ? 'hot' : ''" th:text="${request.urgency}">NORMAL</span>
                    </div>
                    <span class="status-dot done" th:if="${request.resolved}">Resolved</span>
                    <h3 th:text="${request.title}">Request title</h3>
                    <p th:text="${#strings.abbreviate(request.description, 140)}">Description</p>
                    <span class="campus-chip" th:if="${request.campusGroup}" th:text="${request.campusGroup}">MCA</span>
                    <div class="tag-line" th:if="${request.tags}" th:text="${request.tags}">tags</div>
                    <div class="card-meta"><span th:if="${request.anonymous or request.student.deleted}"><i class="bi bi-incognito"></i> <span th:text="'Anonymous Student #' + ${request.id}">Anonymous Student</span></span><span th:unless="${request.anonymous or request.student.deleted}"><i class="bi bi-person-circle"></i> <span th:text="${request.student.displayName}">Student</span></span><span><i class="bi bi-chat-left-text"></i> <span th:text="${request.responseCount}">0</span> replies</span><span th:text="${#temporals.format(request.createdAt, 'dd MMM yyyy')}">Date</span></div>
                </a>
            </div>
        </div>
        <div class="empty-state mt-4" th:if="${#lists.isEmpty(requests.content)}">No active support requests at the moment.</div>
        <nav class="mt-4" th:if="${requests.totalPages > 1}">
            <ul class="pagination">
                <li class="page-item" th:classappend="${requests.first} ? 'disabled'"><a class="page-link" th:href="@{/requests(page=${requests.number-1}, q=${query}, category=${selectedCategory}, urgency=${selectedUrgency}, status=${selectedStatus})}">Previous</a></li>
                <li class="page-item disabled"><span class="page-link" th:text="${requests.number + 1} + ' / ' + ${requests.totalPages}">1 / 1</span></li>
                <li class="page-item" th:classappend="${requests.last} ? 'disabled'"><a class="page-link" th:href="@{/requests(page=${requests.number+1}, q=${query}, category=${selectedCategory}, urgency=${selectedUrgency}, status=${selectedStatus})}">Next</a></li>
            </ul>
        </nav>
    </div>
</main>
</html>
