<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{fragments/layout :: layout(~{::title}, ~{::main})}">
<title>Forgot Password | Silent Help</title>
<main class="auth-page">
    <div class="auth-card">
        <span class="eyebrow dark">Account recovery</span>
        <h1>Reset your password</h1>
        <p class="text-muted">Enter both your username and college email. A reset link will be generated only when they match the same account.</p>
        <div th:if="${successMessage}" class="alert alert-success" th:text="${successMessage}">Reset link generated.</div>
        <div th:if="${resetLink}" class="reset-link-box">
            <span>Reset link</span>
            <a th:href="@{${resetLink}}" th:text="${resetLink}">Reset link</a>
        </div>
        <form th:action="@{/forgot-password}" method="post" class="form-stack">
            <label>Username<input class="form-control" name="username" autocomplete="username" required></label>
            <label>College email<input class="form-control" name="email" type="email" autocomplete="email" required></label>
            <button class="btn btn-primary w-100" type="submit">Generate Reset Link</button>
        </form>
        <a class="small d-inline-block mt-3" th:href="@{/login}">Back to login</a>
    </div>
</main>
</html>
