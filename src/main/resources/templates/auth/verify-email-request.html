<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{fragments/layout :: layout(~{::title}, ~{::main})}">
<title>Verify Email | Silent Help</title>
<main class="auth-page">
    <div class="auth-card">
        <span class="eyebrow dark">College email verification</span>
        <h1>Verify Email</h1>
        <p class="text-muted">Enter your username or college email to generate a verification link for this local setup.</p>
        <div th:if="${error}" class="alert alert-danger" th:text="${error}">Error</div>
        <div th:if="${successMessage}" class="alert alert-info">
            <span th:text="${successMessage}">Verification generated.</span>
            <a th:if="${verificationLink}" th:href="@{${verificationLink}}">Open verification link</a>
        </div>
        <form th:action="@{/verify-email/request}" method="post" class="form-stack">
            <label>Username or college email<input class="form-control" name="account" autocomplete="username" required></label>
            <button class="btn btn-primary w-100" type="submit">Generate Verification Link</button>
        </form>
        <a class="small d-inline-block mt-3" th:href="@{/login}">Back to login</a>
    </div>
</main>
</html>
