<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{fragments/layout :: layout(~{::title}, ~{::main})}">
<title>Report Issue | Silent Help</title>
<main class="section alt">
    <div class="container narrow">
        <section class="content-panel">
            <span class="eyebrow dark">Support</span>
            <h1>Report Issue</h1>
            <p class="text-muted">Share technical problems, moderation concerns, or broken functionality with the admin team.</p>
            <form class="form-stack mt-4" th:action="@{/report-issue}" method="post">
                <label>Name<input class="form-control" name="name" required></label>
                <label>Email<input class="form-control" name="email" type="email" required></label>
                <label>Issue<textarea class="form-control" name="issue" rows="6" required></textarea></label>
                <button class="btn btn-primary" type="submit">Submit Issue</button>
            </form>
        </section>
    </div>
</main>
</html>
