<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{fragments/layout :: layout(~{::title}, ~{::main})}">
<title>Contact Us | Silent Help</title>
<main class="section alt">
    <div class="container narrow">
        <section class="content-panel">
            <span class="eyebrow dark">Contact</span>
            <h1>Contact us</h1>
            <p class="text-muted">Reach out for platform support, moderation concerns, or campus collaboration ideas.</p>
            <form class="form-stack mt-4" th:action="@{/contact}" method="post">
                <div class="form-grid">
                    <label>Name<input class="form-control" name="name" required></label>
                    <label>Email<input class="form-control" name="email" type="email" required></label>
                </div>
                <label>Message<textarea class="form-control" name="message" rows="6" required></textarea></label>
                <button class="btn btn-primary" type="submit">Send Message</button>
            </form>
        </section>
    </div>
</main>
</html>
