<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{fragments/layout :: layout(~{::title}, ~{::main})}">
<title>Reports | Silent Help</title>
<main class="dashboard-layout">
    <div class="container"><div class="layout-grid">
        <div th:replace="~{fragments/admin-sidebar :: admin}"></div>
        <section class="content-panel">
            <span class="eyebrow dark">Admin</span><h1>Reports management</h1>
            <div class="table-responsive mt-4"><table class="table align-middle"><thead><tr><th>Target</th><th>Reason</th><th>Reporter</th><th>Status</th><th></th></tr></thead><tbody>
            <tr th:each="report : ${reports.content}">
                <td><span th:text="${report.targetType}">REQUEST</span> #<span th:text="${report.targetId}">1</span></td>
                <td><strong th:text="${report.reason}">Reason</strong><br><small th:text="${report.details}">Details</small></td>
                <td th:text="${report.reporter.username}">Reporter</td>
                <td th:text="${report.status}">OPEN</td>
                <td><form th:action="@{/admin/reports/{id}/status(id=${report.id})}" method="post" class="d-flex gap-2"><select class="form-select form-select-sm" name="status"><option th:each="status : ${statuses}" th:value="${status}" th:text="${status}" th:selected="${status == report.status}">OPEN</option></select><button class="btn btn-sm btn-dark">Save</button></form></td>
            </tr>
            </tbody></table></div>
        </section>
    </div></div>
</main>
</html>
