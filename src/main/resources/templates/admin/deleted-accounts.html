<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{fragments/layout :: layout(~{::title}, ~{::main})}">
<title>Account Reviews | Silent Help</title>
<main class="dashboard-layout">
    <div class="container"><div class="layout-grid">
        <div th:replace="~{fragments/admin-sidebar :: admin}"></div>
        <section class="content-panel">
            <span class="eyebrow dark">Admin</span>
            <h1>Account reviews</h1>
            <p class="text-muted">Review deactivated accounts and approve reactivation only after checking account history and request reason.</p>
            <div class="table-responsive mt-4">
                <table class="table align-middle">
                    <thead><tr><th>Student</th><th>Email</th><th>Status</th><th>Deactivated at</th><th>Reason</th><th></th></tr></thead>
                    <tbody>
                    <tr th:each="user : ${users.content}">
                        <td><strong th:text="${user.displayName}">Name</strong><br><small th:text="${'@' + user.username}">@username</small></td>
                        <td th:text="${user.email}">email</td>
                        <td><span th:class="${user.accountStatus.name() == 'PENDING_REACTIVATION'} ? 'status-dot urgency' : 'status-dot danger-soft'" th:text="${user.accountStatus}">Status</span></td>
                        <td th:text="${user.deletedAt != null ? #temporals.format(user.deletedAt, 'dd MMM yyyy, HH:mm') : 'Not recorded'}">Date</td>
                        <td class="reason-cell" th:text="${user.deletionReason} ?: 'No reason provided'">Reason</td>
                        <td>
                            <div class="table-actions">
                                <form th:action="@{/admin/deleted-accounts/{id}/reactivate(id=${user.id})}" method="post">
                                    <button class="btn btn-sm btn-outline-primary" type="submit">Approve</button>
                                </form>
                                <form th:if="${user.accountStatus.name() == 'PENDING_REACTIVATION'}" th:action="@{/admin/deleted-accounts/{id}/reject(id=${user.id})}" method="post">
                                    <button class="btn btn-sm btn-outline-danger" type="submit">Reject</button>
                                </form>
                            </div>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>
            <div class="empty-state" th:if="${#lists.isEmpty(users.content)}">No accounts need review.</div>
        </section>
    </div></div>
</main>
</html>
