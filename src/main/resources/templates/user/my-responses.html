<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{fragments/layout :: layout(~{::title}, ~{::main})}">
<title>My Responses | Silent Help</title>
<main class="dashboard-layout">
    <div class="container"><div class="layout-grid">
        <div th:replace="~{fragments/sidebar :: sidebar}"></div>
        <section class="content-panel">
            <span class="eyebrow dark">My activity</span><h1>My responses</h1>
            <div class="response-card" th:each="response : ${responses}">
                <div class="card-meta"><a th:href="@{/requests/{id}(id=${response.helpRequest.id})}" th:text="${response.helpRequest.title}">Request</a><span th:text="${#temporals.format(response.createdAt, 'dd MMM yyyy')}">Date</span></div>
                <p th:text="${response.message}">Response</p>
            </div>
            <div class="empty-state" th:if="${#lists.isEmpty(responses)}">You have not responded to a request yet.</div>
        </section>
    </div></div>
</main>
</html>
