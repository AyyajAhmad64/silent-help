<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{fragments/layout :: layout(~{::title}, ~{::main})}">
<title>Private Chats | Silent Help</title>
<main class="dashboard-layout">
    <div class="container"><div class="layout-grid">
        <div th:replace="~{fragments/sidebar :: sidebar}"></div>
        <section class="content-panel">
            <span class="eyebrow dark">Private</span><h1>Chats</h1>
            <a class="chat-list-row" th:each="conversation : ${conversations}" th:href="@{/chats/{id}(id=${conversation.id})}">
                <div>
                    <strong th:text="${conversation.helpRequest.title}">Request title</strong>
                    <p>With <span th:text="${conversation.otherParticipant(user).displayName}">Student</span></p>
                </div>
                <small th:text="${#temporals.format(conversation.updatedAt, 'dd MMM yyyy, HH:mm')}">Date</small>
            </a>
            <div class="empty-state" th:if="${#lists.isEmpty(conversations)}">No conversations started yet.</div>
        </section>
    </div></div>
</main>
</html>
