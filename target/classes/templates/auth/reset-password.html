<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{fragments/layout :: layout(~{::title}, ~{::main})}">
<title>Reset Password | Silent Help</title>
<main class="auth-page">
    <div class="auth-card">
        <span class="eyebrow dark">Account recovery</span>
        <h1>Create new password</h1>
        <div th:if="${error}" class="alert alert-danger" th:text="${error}">Error</div>
        <form th:action="@{/reset-password}" method="post" class="form-stack">
            <input type="hidden" name="token" th:value="${token}">
            <label>New password<input class="form-control" name="password" type="password" autocomplete="new-password" required></label>
            <label>Confirm password<input class="form-control" name="confirmPassword" type="password" autocomplete="new-password" required></label>
            <button class="btn btn-primary w-100" type="submit">Reset Password</button>
        </form>
    </div>
</main>
</html>
