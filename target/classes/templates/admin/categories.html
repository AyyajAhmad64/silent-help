<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{fragments/layout :: layout(~{::title}, ~{::main})}">
<title>Categories | Silent Help</title>
<main class="dashboard-layout">
    <div class="container"><div class="layout-grid">
        <div th:replace="~{fragments/admin-sidebar :: admin}"></div>
        <section class="content-panel">
            <span class="eyebrow dark">Admin</span><h1>Manage categories</h1>
            <form th:action="@{/admin/categories}" method="post" class="row g-3 mt-2">
                <div class="col-md-3"><input class="form-control" name="name" placeholder="Name" required></div>
                <div class="col-md-3"><input class="form-control" name="slug" placeholder="slug-name" required></div>
                <div class="col-md-3"><input class="form-control" name="icon" placeholder="bi-book"></div>
                <div class="col-md-2"><input class="form-control" name="color" placeholder="#2563eb"></div>
                <div class="col-md-1"><button class="btn btn-primary w-100" type="submit">Add</button></div>
            </form>
            <div class="category-grid mt-4">
                <div class="category-card static" th:each="category : ${categories}">
                    <i th:class="'bi ' + ${category.icon}" th:style="'color:' + ${category.color}"></i>
                    <span th:text="${category.name}">Category</span>
                    <form th:action="@{/admin/categories/{id}/toggle(id=${category.id})}" method="post"><button class="btn btn-sm btn-outline-dark" th:text="${category.active} ? 'Deactivate' : 'Activate'">Toggle</button></form>
                </div>
            </div>
        </section>
    </div></div>
</main>
</html>
