<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{fragments/layout :: layout(~{::title}, ~{::main})}">
<title>Manage Users | Silent Help</title>
<main class="dashboard-layout">
    <div class="container"><div class="layout-grid">
        <div th:replace="~{fragments/admin-sidebar :: admin}"></div>
        <section class="content-panel">
            <span class="eyebrow dark">Admin</span><h1>Manage users</h1>
            <form class="filter-bar mt-3" th:action="@{/admin/users}" method="get"><input class="form-control" name="q" th:value="${query}" placeholder="Search users"><button class="btn btn-dark">Search</button></form>
            <div class="table-responsive mt-4"><table class="table align-middle"><thead><tr><th>Registered Student</th><th>Email</th><th>Department</th><th>Year</th><th>Joined</th><th>Status</th><th></th></tr></thead><tbody>
            <tr th:each="user : ${users.content}"><td><strong th:text="${user.displayName}">Name</strong><br><small th:text="${user.username}">username</small></td><td><span th:text="${user.email}">Email</span><br><span class="status-dot done">College verified</span></td><td th:text="${user.department} ?: 'Not provided'">Dept</td><td th:text="${user.yearOfStudy} ?: 'Not provided'">Year</td><td th:text="${#temporals.format(user.createdAt, 'dd MMM yyyy')}">Date</td><td><span th:class="${user.deleted} ? 'status-dot danger-soft' : (${user.enabled} ? 'status-dot done' : 'status-dot urgency hot')" th:text="${user.deleted} ? 'Deleted' : (${user.enabled} ? 'Active' : 'Suspended')">Active</span></td><td><form th:if="${!user.deleted}" th:action="@{/admin/users/{id}/enabled(id=${user.id})}" method="post"><input type="hidden" name="enabled" th:value="${!user.enabled}"><button class="btn btn-sm btn-outline-dark" th:text="${user.enabled} ? 'Suspend' : 'Activate'">Toggle</button></form><a th:if="${user.deleted}" class="btn btn-sm btn-outline-dark" th:href="@{/admin/deleted-accounts}">Review</a></td></tr>
            </tbody></table></div>
        </section>
    </div></div>
</main>
</html>
