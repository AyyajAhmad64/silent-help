<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{fragments/layout :: layout(~{::title}, ~{::main})}">
<title>Notifications | Silent Help</title>
<main class="dashboard-layout">
    <div class="container"><div class="layout-grid">
        <div th:replace="~{fragments/sidebar :: sidebar}"></div>
        <section class="content-panel">
            <span class="eyebrow dark">Alerts</span><h1>Notifications</h1>
            <a class="notification-row" th:each="notification : ${notifications}" th:href="@{/notifications/{id}/open(id=${notification.id})}" th:classappend="${!notification.readStatus} ? 'unread'">
                <div><strong th:text="${notification.title}">Title</strong><p th:text="${notification.message}">Message</p><small th:text="${#temporals.format(notification.createdAt, 'dd MMM yyyy, HH:mm')}">Date</small></div>
                <i class="bi bi-chevron-right"></i>
            </a>
            <div class="empty-state" th:if="${#lists.isEmpty(notifications)}">No notifications yet.</div>
        </section>
    </div></div>
</main>
</html>
