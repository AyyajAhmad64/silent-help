<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{fragments/layout :: layout(~{::title}, ~{::main})}">
<title>My Requests | Silent Help</title>
<main class="dashboard-layout">
    <div class="container"><div class="layout-grid">
        <div th:replace="~{fragments/sidebar :: sidebar}"></div>
        <section class="content-panel">
            <div class="d-flex justify-content-between align-items-center flex-wrap gap-3">
                <div><span class="eyebrow dark">My activity</span><h1>My requests</h1></div>
                <a class="btn btn-primary" th:href="@{/requests/new}">Create Request</a>
            </div>
            <div class="table-responsive mt-4">
                <table class="table align-middle">
                    <thead><tr><th>Title</th><th>Category</th><th>Priority</th><th>Views</th><th>Replies</th><th>Status</th><th>Created</th><th></th></tr></thead>
                    <tbody>
                    <tr th:each="request : ${requests}">
                        <td><a th:href="@{/requests/{id}(id=${request.id})}" th:text="${request.title}">Title</a></td>
                        <td th:text="${request.category.name}">Category</td>
                        <td><span class="status-dot urgency" th:classappend="${request.urgency == 'URGENT' || request.urgency == 'HIGH'} ? 'hot' : ''" th:text="${request.urgency}">NORMAL</span></td>
                        <td th:text="${request.viewCount}">0</td>
                        <td th:text="${request.responseCount}">0</td>
                        <td><span class="status-dot" th:classappend="${request.resolved} ? 'done' : ''" th:text="${request.status}">Open</span></td>
                        <td th:text="${#temporals.format(request.createdAt, 'dd MMM yyyy')}">Date</td>
                        <td><form th:action="@{/requests/{id}/resolve(id=${request.id})}" method="post"><button class="btn btn-sm btn-outline-primary" type="submit">Toggle</button></form></td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </section>
    </div></div>
</main>
</html>
